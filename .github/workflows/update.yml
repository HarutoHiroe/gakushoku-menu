name: update-menu

on:
  schedule:
    # UTC指定。JST 10:27 / 13:27 / 16:27 に相当（1日3回）
    # GitHub cronは"ちょうどの時刻(0分)"だと混雑で遅延/スキップされやすいので、
    # 分を27にずらし & 回数を3回にして「どれかは走る」確実性を上げる。
    # 同じ画像はキャッシュで課金ゼロなので回数を増やしてもコストは増えない。
    - cron: "27 1,4,7 * * *"
  workflow_dispatch: {}   # 手動実行ボタンも有効化

permissions:
  contents: write

# 同時実行を防ぐ（cronと手動が重なっても1本に）
concurrency:
  group: update-menu
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build index.html
        run: python build.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html cache/
          if git diff --staged --quiet; then
            echo "変更なし（メニュー更新なし）"
          else
            git commit -m "🤖 学食メニュー自動更新 ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST'))"
            git push
            echo "✅ 更新をpushした"
          fi
